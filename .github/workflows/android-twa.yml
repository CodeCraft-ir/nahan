name: Build Android TWA

# Builds the Nahan PWA into a signed Android TWA (APK + AAB).
# Runs on GitHub's runners, which are NOT geo-blocked from Google's
# Android SDK / Maven — so this works even though local builds from Iran
# cannot reach dl.google.com.
#
# Trigger manually from the Actions tab, or by pushing a tag like `twa-v1`.
#
# Required repository secrets (Settings → Secrets and variables → Actions):
#   ANDROID_KEYSTORE_BASE64    - base64 of twa/android.keystore
#   ANDROID_KEYSTORE_PASSWORD  - keystore password
#   ANDROID_KEY_PASSWORD       - key password (same as keystore password here)

on:
  workflow_dispatch:
  push:
    tags:
      - "twa-v*"

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: twa

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install required SDK packages
        run: sdkmanager "platform-tools" "platforms;android-36" "build-tools;34.0.0"

      - name: Configure Bubblewrap (JDK + SDK paths)
        run: |
          mkdir -p "$HOME/.bubblewrap"
          printf '{"jdkPath":"%s","androidSdkPath":"%s"}' \
            "$JAVA_HOME" "$ANDROID_SDK_ROOT" > "$HOME/.bubblewrap/config.json"
          cat "$HOME/.bubblewrap/config.json"

      - name: Install dependencies
        run: npm ci

      - name: Generate Android project from twa-manifest.json
        run: node generate-project.mjs

      - name: Restore signing keystore
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          if [ -z "$ANDROID_KEYSTORE_BASE64" ]; then
            echo "::error::Missing secret ANDROID_KEYSTORE_BASE64"; exit 1
          fi
          echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > android.keystore
          echo "Keystore restored ($(wc -c < android.keystore) bytes)"

      - name: Build signed APK + AAB
        env:
          BUBBLEWRAP_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          BUBBLEWRAP_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: ./node_modules/.bin/bubblewrap build --skipPwaValidation

      - name: Show signing fingerprint (for assetlinks.json)
        run: |
          keytool -list -v -keystore android.keystore -alias android \
            -storepass "${{ secrets.ANDROID_KEYSTORE_PASSWORD }}" 2>/dev/null \
            | grep -i "SHA256:" || true

      - name: Upload APK + AAB
        uses: actions/upload-artifact@v4
        with:
          name: nahan-twa
          path: |
            twa/app-release-signed.apk
            twa/app-release-bundle.aab
          if-no-files-found: error
